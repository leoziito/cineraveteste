<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CineMerge PRO v6.5 | Integração Inteligente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00c851;
            --primary-dark: #007e33;
            --bg-dark: #050505;
            --bg-panel: #0d0d0d;
            --bg-card: #161616;
            --border: #222222;
            --text-main: #e0e0e0;
            --text-dim: #888888;
            --error: #ff4a4a;
            --warning: #ffaa00;
            --info: #33b5e5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        /* Header Aprimorado */
        header { 
            background-color: var(--bg-panel); 
            padding: 10px 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border); 
            flex-shrink: 0; 
            height: 60px;
        }
        
        .logo { font-size: 20px; font-weight: 900; letter-spacing: 2px; color: #fff; display: flex; align-items: center; gap: 8px; }
        .logo span { color: var(--primary); }
        .version-badge { background: #1a1a1a; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 900; color: var(--primary); border: 1px solid var(--primary-dark); }

        .header-actions { display: flex; gap: 10px; }

        .main-container { display: flex; flex: 1; overflow: hidden; flex-direction: row; }

        /* Painel Esquerdo: Editores e Preview */
        .left-panel { flex: 1.2; display: flex; flex-direction: column; border-right: 1px solid var(--border); background: var(--bg-panel); min-width: 0; position: relative; }
        .tabs { display: flex; background: #0a0a0a; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .tab { flex: 1; text-align: center; padding: 14px 10px; font-size: 12px; font-weight: 700; color: var(--text-dim); cursor: pointer; text-transform: uppercase; transition: all 0.2s; border-bottom: 2px solid transparent; }
        .tab.active { color: #fff; border-bottom-color: var(--primary); background: rgba(0, 200, 81, 0.05); }
        .tab.preview-tab { border-bottom-color: transparent; }
        .tab.preview-tab.active { color: #fff; border-bottom-color: var(--info); background: rgba(51, 181, 229, 0.05); }
        
        .editor-container { flex: 1; display: flex; flex-direction: column; position: relative; min-height: 0; }
        .editor-wrapper { flex: 1; position: relative; overflow: hidden; display: flex; }
        
        .line-numbers { 
            width: 45px; 
            background: #080808; 
            color: #333; 
            font-family: 'Fira Code', monospace; 
            font-size: 12px; 
            text-align: right; 
            padding: 15px 10px; 
            user-select: none; 
            border-right: 1px solid var(--border); 
            overflow: hidden;
        }

        .editor-textarea { 
            flex: 1; 
            background: transparent; 
            color: #d4d4d4; 
            font-family: 'Fira Code', monospace; 
            font-size: 13px; 
            padding: 15px; 
            border: none; 
            resize: none; 
            outline: none; 
            line-height: 1.6; 
            white-space: pre; 
            overflow: auto; 
            width: 100%;
        }
        
        #result-area { display: none; }
        
        /* Estilos do Preview e Botões Flutuantes */
        #preview-area { display: none; background: #000; flex: 1; position: relative; }
        #preview-frame { width: 100%; height: 100%; border: none; background: #000; }
        
        .preview-actions { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 10px; z-index: 100; }
        .preview-btn { background: rgba(10, 10, 10, 0.8); border: 1px solid #333; color: #fff; padding: 10px 16px; border-radius: 30px; font-size: 12px; font-weight: 800; cursor: pointer; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.6); transition: transform 0.2s ease, border-color 0.2s ease; text-transform: uppercase; }
        .preview-btn:hover { border-color: #666; background: rgba(20, 20, 20, 0.9); }
        .preview-btn:active { transform: scale(0.95); }
        .preview-btn svg { width: 16px; height: 16px; fill: #fff; }

        .floating-action { position: absolute; top: 10px; right: 20px; display: flex; gap: 8px; z-index: 10; }
        .btn-mini { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: all 0.2s; }
        .btn-mini:hover { background: #252525; border-color: #444; }
        .btn-mini.success { background: var(--primary); color: #000; border: none; }
        .btn-mini svg { width: 14px; height: 14px; fill: currentColor; }

        /* Painel Direito: Regras/Patches */
        .right-panel { width: 480px; display: flex; flex-direction: column; background: var(--bg-dark); z-index: 10; flex-shrink: 0; }
        .right-header { padding: 15px 20px; background: var(--bg-panel); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;}
        .right-title { font-size: 13px; font-weight: 900; text-transform: uppercase; color: var(--text-dim); }
        
        .search-patches-box { padding: 10px 15px; background: #0a0a0a; border-bottom: 1px solid var(--border); }
        .input-search { width: 100%; background: #161616; border: 1px solid #222; padding: 8px 12px; border-radius: 8px; color: #fff; font-size: 12px; outline: none; transition: border-color 0.2s; }
        .input-search:focus { border-color: var(--primary); }

        .patches-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; scrollbar-width: thin; scrollbar-color: #333 transparent; }
        
        .patch-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 12px; transition: all 0.3s ease; position: relative; }
        
        /* Status Colors for Patches */
        .patch-card.found-perfect { border-left: 4px solid var(--primary); }
        .patch-card.not-found { border-left: 4px solid var(--error); }
        .patch-card.found-multiple { border-left: 4px solid var(--warning); }
        .patch-card.already-exists { border-left: 4px solid var(--info); }
        
        .patch-header { display: flex; justify-content: space-between; align-items: center; }
        .patch-index { font-size: 11px; font-weight: 900; color: var(--text-dim); background: #222; padding: 2px 8px; border-radius: 4px; }
        .btn-remove { background: none; border: none; color: var(--text-dim); cursor: pointer; transition: color 0.2s; font-size: 11px; font-weight: 800; text-transform: uppercase; padding: 4px;}
        .btn-remove:hover { color: var(--error); }
        
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-label { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
        .status-indicator { font-size: 9px; font-weight: 900; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.05); }

        .select-base { background: #0a0a0a; color: #fff; border: 1px solid #222; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: 600; outline: none; cursor: pointer; }
        .textarea-snippet { background: #0a0a0a; color: #fff; border: 1px solid #222; padding: 10px; border-radius: 8px; font-size: 12px; font-family: 'Fira Code', monospace; outline: none; resize: vertical; min-height: 60px; line-height: 1.4; white-space: pre; overflow-wrap: normal; overflow-x: auto; }
        .textarea-snippet:focus { border-color: var(--primary-dark); }
        
        .btn-add-patch { background: transparent; border: 1px dashed #333; color: var(--text-dim); padding: 15px; border-radius: 12px; font-size: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: all 0.2s; margin: 0 15px 15px 15px; }
        .btn-add-patch:hover { background: #111; color: #fff; border-color: #555; }
        
        .right-footer { padding: 15px; background: var(--bg-panel); border-top: 1px solid var(--border); display: flex; gap: 10px; flex-shrink: 0; }
        .btn-merge { flex: 2; background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 10px; font-size: 14px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: transform 0.1s; box-shadow: 0 4px 15px rgba(0, 200, 81, 0.2); }
        .btn-merge:active { transform: scale(0.97); }
        
        .btn-io { flex: 1; background: #1a1a1a; color: #fff; border: 1px solid #333; border-radius: 10px; padding: 10px; font-size: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }

        /* Toast */
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #fff; color: #000; padding: 12px 24px; border-radius: 30px; font-size: 13px; font-weight: 800; opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 9999; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Responsividade Mobile */
        @media (max-width: 1024px) {
            body { height: auto; overflow: visible; display: block; overscroll-behavior-y: none; }
            header { position: sticky; top: 0; z-index: 100; padding: 0 15px; }
            .main-container { flex-direction: column; height: auto; display: block; }
            .left-panel { height: 45vh; border-right: none; border-bottom: 2px solid var(--border); display: flex; flex-direction: column; }
            .right-panel { width: 100%; flex: none; display: block; height: auto; }
            .patches-list { overflow-y: visible; height: auto; }
            .right-footer { position: sticky; bottom: 0; z-index: 50; }
        }

        /* Scrollbar Personalizada */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }
    </style>
</head>
<body>

    <header>
        <div class="logo">CINE<span>MERGE</span> <div class="version-badge">PRO v6.5</div></div>
        <div class="header-actions">
            <button class="btn-mini" onclick="exportPatches()" type="button">
                <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> Exportar
            </button>
            <label class="btn-mini" style="cursor:pointer;">
                <svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg> Importar
                <input type="file" id="import-file" style="display:none" onchange="importPatches(event)">
            </label>
        </div>
    </header>

    <div class="main-container">
        <!-- ÁREA DO CÓDIGO & PREVIEW -->
        <div class="left-panel">
            <div class="tabs">
                <div class="tab active" id="tab-original" onclick="switchTab('original')">1. Código Original</div>
                <div class="tab" id="tab-result" onclick="switchTab('result')">2. Integrado</div>
                <div class="tab preview-tab" id="tab-preview" onclick="switchTab('preview')">
                    <svg viewBox="0 0 24 24" style="width:14px; height:14px; fill:currentColor; vertical-align: middle; margin-right:4px; margin-top:-2px;"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                    3. Preview
                </div>
            </div>
            
            <div class="editor-container" id="original-area">
                <div class="floating-action">
                    <button class="btn-mini" onclick="clearAll()" type="button">Limpar Tudo</button>
                    <button class="btn-mini" onclick="pasteFromClipboard()" type="button">Colar</button>
                </div>
                <div class="editor-wrapper">
                    <div class="line-numbers" id="line-numbers-base"></div>
                    <textarea id="base-code" class="editor-textarea" placeholder="Cole aqui o seu index.html completo do Cinerave..." onscroll="syncScroll(this, 'line-numbers-base')" oninput="handleCodeInput()"></textarea>
                </div>
            </div>
            
            <div class="editor-container" id="result-area">
                <div class="floating-action">
                    <button class="btn-mini success" onclick="copyResult()" type="button">
                        <svg viewBox="0 0 24 24"><path d="M16 1H4C2.9 1 2 1.9 2 3V17H4V3H16V1ZM19 5H8C6.9 5 6 5.9 6 7V21C6 22.1 6.9 23 8 23H19C20.1 23 21 22.1 21 21V7C21 5.9 20.1 5 19 5ZM19 21H8V7H19V21Z"/></svg>
                        Copiar Resultado
                    </button>
                </div>
                <div class="editor-wrapper">
                    <div class="line-numbers" id="line-numbers-final"></div>
                    <textarea id="final-code" class="editor-textarea" readonly placeholder="O código final aparecerá aqui após o Merge..."></textarea>
                </div>
            </div>

            <!-- Area de Preview com iframe -->
            <div class="editor-container" id="preview-area">
                <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups" title="Cinerave Preview" allowfullscreen></iframe>
                
                <div class="preview-actions">
                    <button class="preview-btn" onclick="toggleFullScreen()" type="button" title="Abrir em Tela Cheia">
                        <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                        Tela Cheia
                    </button>
                    <button class="preview-btn" onclick="refreshPreview()" type="button" title="Atualizar Preview" style="border-color: var(--info); color: var(--info);">
                        <svg viewBox="0 0 24 24" style="fill: var(--info);"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                        Atualizar
                    </button>
                </div>
            </div>
        </div>

        <!-- PAINEL DE REGRAS -->
        <div class="right-panel">
            <div class="right-header">
                <div class="right-title">Regras de Integração</div>
                <div id="found-count" style="font-size: 10px; font-weight: 800; color: var(--primary);">0 Ativas</div>
            </div>

            <div class="search-patches-box">
                <input type="text" class="input-search" id="search-patch" placeholder="Filtrar regras pelo nome ou código..." oninput="filterPatchesUI()">
            </div>
            
            <div class="patches-list" id="patches-container">
                <!-- Injetado via JS -->
            </div>
            
            <button class="btn-add-patch" onclick="addNewPatch()" type="button">+ Adicionar Nova Regra</button>
            
            <div class="right-footer">
                <button class="btn-merge" id="btn-merge-action" onclick="runMergeEngine()" type="button">Fundir Código (Merge)</button>
            </div>
        </div>
    </div>

    <div id="toast">Ação realizada!</div>

    <script>
        // --- ESTADO GLOBAL ---
        let patches = [];

        // --- INICIALIZAÇÃO ---
        window.onload = () => {
            loadSavedData();
            if (patches.length === 0) addNewPatch();
            updateLineNumbers('base-code', 'line-numbers-base');
        };

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // --- GERENCIAMENTO DE PATCHES ---
        function addNewPatch(target = '', newCode = '', action = 'replace') {
            const id = Date.now() + Math.random();
            patches.push({ id, target, newCode, action });
            renderPatches();
            saveData();
            // Scroll para a nova regra se não for a inicialização
            if(patches.length > 1) {
                setTimeout(() => {
                    const container = document.getElementById('patches-container');
                    container.scrollTop = container.scrollHeight;
                }, 100);
            }
        }

        function removePatch(id) {
            if(confirm("Tem certeza que deseja remover esta regra?")) {
                patches = patches.filter(p => p.id !== id);
                renderPatches();
                saveData();
            }
        }

        function updatePatchData(id, field, value) {
            const patch = patches.find(p => p.id === id);
            if (patch) {
                patch[field] = value;
                saveData();
                validatePatch(patch); // Validação inteligente em tempo real
            }
        }

        // --- MOTOR DE DETECÇÃO INTELIGENTE ---
        function escapeRegExpFlexible(string) {
            if (!string) return "";
            // Escapa caracteres especiais de regex
            let escaped = string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            // Transforma qualquer whitespace (espaço, tab, quebra de linha) em um coringa flexível
            return escaped.replace(/\\s+|\s+/g, '\\s+');
        }

        function validatePatch(patch) {
            const baseCode = document.getElementById('base-code').value;
            const card = document.querySelector(`[data-id="${patch.id}"]`);
            if (!card) return;

            const statusLabelTarget = card.querySelector('.status-target');
            const statusLabelNew = card.querySelector('.status-newcode');
            
            // Reseta classes
            card.classList.remove('found-perfect', 'not-found', 'found-multiple', 'already-exists');
            statusLabelTarget.style.color = 'var(--text-dim)';
            statusLabelTarget.innerText = 'Pendente';
            
            if (statusLabelNew) {
                statusLabelNew.innerText = '';
                statusLabelNew.style.color = 'var(--text-dim)';
            }

            if (!baseCode.trim()) return;

            // 1. Validar Alvo (Target)
            const targetRaw = patch.target.trim();
            if (targetRaw) {
                const flexRegex = new RegExp(escapeRegExpFlexible(targetRaw), 'g');
                const matches = baseCode.match(flexRegex);
                const matchCount = matches ? matches.length : 0;

                if (matchCount === 0) {
                    card.classList.add('not-found');
                    statusLabelTarget.innerText = '✗ Não Localizado';
                    statusLabelTarget.style.color = 'var(--error)';
                } else if (matchCount === 1) {
                    card.classList.add('found-perfect');
                    statusLabelTarget.innerText = '✓ Encontrado (Perfeito)';
                    statusLabelTarget.style.color = 'var(--primary)';
                } else {
                    card.classList.add('found-multiple');
                    statusLabelTarget.innerText = `⚠ ${matchCount} Ocorrências`;
                    statusLabelTarget.style.color = 'var(--warning)';
                }
            }

            // 2. Validar Código Novo (Prevenção de Duplicidade)
            const newCodeRaw = patch.newCode.trim();
            if (newCodeRaw && newCodeRaw.length > 20) { // Ignora blocos muito pequenos pra evitar falsos positivos
                const flexNewCodeRegex = new RegExp(escapeRegExpFlexible(newCodeRaw), 'g');
                if (flexNewCodeRegex.test(baseCode)) {
                    card.classList.add('already-exists');
                    if (statusLabelNew) {
                        statusLabelNew.innerText = 'ℹ Já existe no arquivo (Duplicado?)';
                        statusLabelNew.style.color = 'var(--info)';
                    }
                }
            }
        }

        function renderPatches() {
            const container = document.getElementById('patches-container');
            container.innerHTML = '';

            patches.forEach((patch, index) => {
                const div = document.createElement('div');
                div.className = 'patch-card';
                div.setAttribute('data-id', patch.id);
                div.innerHTML = `
                    <div class="patch-header">
                        <span class="patch-index">Regra #${index + 1}</span>
                        <button type="button" class="btn-remove" onclick="removePatch(${patch.id})">Remover</button>
                    </div>
                    <div class="input-group">
                        <span class="input-label">Ação de Injeção:</span>
                        <select class="select-base" onchange="updatePatchData(${patch.id}, 'action', this.value)">
                            <option value="replace" ${patch.action === 'replace' ? 'selected' : ''}>Substituir Exatamente (Padrão)</option>
                            <option value="insert_before" ${patch.action === 'insert_before' ? 'selected' : ''}>Colar ANTES do Alvo (Acima)</option>
                            <option value="insert_after" ${patch.action === 'insert_after' ? 'selected' : ''}>Colar DEPOIS do Alvo (Abaixo)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <span class="input-label">
                            O que procurar (Alvo):
                            <span class="status-indicator status-target">Pendente</span>
                        </span>
                        <textarea class="textarea-snippet" oninput="updatePatchData(${patch.id}, 'target', this.value)" placeholder="Cole o código antigo aqui...">${patch.target}</textarea>
                    </div>
                    <div class="input-group">
                        <span class="input-label" style="margin-top: 5px;">
                            Novo Código:
                            <span class="status-indicator status-newcode" style="text-transform:none;"></span>
                        </span>
                        <textarea class="textarea-snippet" oninput="updatePatchData(${patch.id}, 'newcode', this.value)" placeholder="Cole a nova implementação aqui...">${patch.newCode}</textarea>
                    </div>
                `;
                container.appendChild(div);
                validatePatch(patch);
            });
            document.getElementById('found-count').innerText = `${patches.length} Regras`;
        }

        function filterPatchesUI() {
            const query = document.getElementById('search-patch').value.toLowerCase();
            const cards = document.querySelectorAll('.patch-card');
            cards.forEach((card, index) => {
                const patchData = patches[index];
                const content = (patchData.target + " " + patchData.newCode).toLowerCase();
                card.style.display = content.includes(query) ? 'flex' : 'none';
            });
        }

        // --- MOTOR DE MERGE ---
        function runMergeEngine() {
            let baseCode = document.getElementById('base-code').value;
            if (!baseCode.trim()) return showToast("Cole o código original do site primeiro na Aba 1!");

            let successCount = 0;
            let warningCount = 0;
            let finalCode = baseCode;

            // Ordena os patches: replace primeiro, depois inserts (boa prática para não perder referência)
            const sortedPatches = [...patches].sort((a, b) => {
                if(a.action === 'replace' && b.action !== 'replace') return -1;
                if(a.action !== 'replace' && b.action === 'replace') return 1;
                return 0;
            });

            sortedPatches.forEach(patch => {
                const targetRaw = patch.target.trim();
                if (!targetRaw) return;

                // Usa flag global para garantir a troca caso tenha multiplos alvos e o user saiba disso
                const flexRegex = new RegExp(escapeRegExpFlexible(targetRaw), 'g');
                
                const matchCount = (finalCode.match(flexRegex) || []).length;

                if (matchCount > 0) {
                    if (patch.action === 'replace') {
                        finalCode = finalCode.replace(flexRegex, patch.newCode);
                    } else if (patch.action === 'insert_before') {
                        // Função callback de replace pra não bugar os tokens de cifrão no novo código
                        finalCode = finalCode.replace(flexRegex, (match) => patch.newCode + '\n' + match);
                    } else if (patch.action === 'insert_after') {
                        finalCode = finalCode.replace(flexRegex, (match) => match + '\n' + patch.newCode);
                    }
                    successCount++;
                    if(matchCount > 1) warningCount++;
                } else {
                    console.warn("Patch falhou. Alvo não encontrado:", targetRaw);
                }
            });

            document.getElementById('final-code').value = finalCode;
            updateLineNumbers('final-code', 'line-numbers-final');
            switchTab('result');
            
            // Auto atualiza o preview no background
            updatePreviewFrame(finalCode);

            if (successCount === patches.length && warningCount === 0) {
                showToast("Sucesso Total! Código gerado com precisão.");
            } else if (successCount > 0) {
                showToast(`Merge Finalizado: ${successCount}/${patches.length} aplicados. (${warningCount} multiplos). Verifique o código.`);
            } else {
                showToast("Falha. Nenhuma regra encontrou um alvo válido no código.");
            }
        }

        // --- SISTEMA DE PREVIEW ---
        function updatePreviewFrame(codeStr) {
            const frame = document.getElementById('preview-frame');
            // Como é um HTML completo com scripts complexos, injetamos via srcdoc
            frame.srcdoc = codeStr;
        }

        function refreshPreview() {
            let codeToPreview = document.getElementById('final-code').value;
            if(!codeToPreview.trim()) {
                codeToPreview = document.getElementById('base-code').value;
            }
            if(!codeToPreview.trim()) {
                showToast("Não há código para gerar preview.");
                return;
            }
            updatePreviewFrame(codeToPreview);
            showToast("Preview Atualizado!");
        }

        function toggleFullScreen() {
            const iframe = document.getElementById('preview-frame');
            if (!document.fullscreenElement) {
                if (iframe.requestFullscreen) {
                    iframe.requestFullscreen();
                } else if (iframe.webkitRequestFullscreen) { /* Safari */
                    iframe.webkitRequestFullscreen();
                } else if (iframe.msRequestFullscreen) { /* IE11 */
                    iframe.msRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) { /* Safari */
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) { /* IE11 */
                    document.msExitFullscreen();
                }
            }
        }

        // --- UTILITÁRIOS DE UI ---
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('original-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'none';
            document.getElementById('preview-area').style.display = 'none';
            
            const targetTab = document.getElementById(`tab-${tab}`);
            if(targetTab) targetTab.classList.add('active');
            
            document.getElementById(`${tab}-area`).style.display = 'flex';

            // Se for a aba preview, tenta auto-atualizar
            if (tab === 'preview') {
                const finalCode = document.getElementById('final-code').value;
                const iframe = document.getElementById('preview-frame');
                if (finalCode.trim() && iframe.srcdoc === '') {
                    updatePreviewFrame(finalCode);
                } else if (!finalCode.trim() && document.getElementById('base-code').value.trim() && iframe.srcdoc === '') {
                    updatePreviewFrame(document.getElementById('base-code').value);
                }
            }
        }

        function updateLineNumbers(textareaId, linesId) {
            const textarea = document.getElementById(textareaId);
            const lineNumbers = document.getElementById(linesId);
            if(!textarea || !lineNumbers) return;
            const lines = textarea.value.split('\n').length;
            let linesHtml = '';
            for (let i = 1; i <= lines; i++) {
                linesHtml += i + '<br>';
            }
            lineNumbers.innerHTML = linesHtml;
        }

        function syncScroll(el, linesId) {
            const lineNumbers = document.getElementById(linesId);
            if(lineNumbers) lineNumbers.scrollTop = el.scrollTop;
        }

        function handleCodeInput() {
            updateLineNumbers('base-code', 'line-numbers-base');
            saveData();
            // Revalida todos os patches para atualizar o status visual verde/vermelho
            patches.forEach(p => validatePatch(p));
        }

        async function pasteFromClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('base-code').value = text;
                handleCodeInput();
                showToast("Código colado da área de transferência.");
            } catch (err) {
                showToast("Erro ao colar. Permissão negada pelo navegador.");
            }
        }

        function copyResult() {
            const code = document.getElementById('final-code').value;
            if (!code) return showToast("Não há código final para copiar.");
            navigator.clipboard.writeText(code).then(() => {
                showToast("Código final copiado com sucesso! Pode levar pro seu site.");
            }).catch(()=> {
                showToast("Erro ao copiar.");
            });
        }

        function clearAll() {
            if(confirm("ATENÇÃO: Deseja apagar o código original e TODAS as suas regras de integração?")) {
                document.getElementById('base-code').value = '';
                document.getElementById('final-code').value = '';
                document.getElementById('preview-frame').srcdoc = '';
                patches = [];
                addNewPatch();
                saveData();
                renderPatches();
                updateLineNumbers('base-code', 'line-numbers-base');
                updateLineNumbers('final-code', 'line-numbers-final');
                showToast("Tudo limpo.");
            }
        }

        // --- PERSISTÊNCIA E I/O ---
        function saveData() {
            const baseCode = document.getElementById('base-code').value;
            localStorage.setItem('cinemerge_v6_base', baseCode);
            localStorage.setItem('cinemerge_v6_patches', JSON.stringify(patches));
        }

        function loadSavedData() {
            const savedBase = localStorage.getItem('cinemerge_v6_base');
            const savedPatches = localStorage.getItem('cinemerge_v6_patches');
            
            if (savedBase) {
                document.getElementById('base-code').value = savedBase;
            }
            if (savedPatches) {
                try {
                    patches = JSON.parse(savedPatches);
                    if (!Array.isArray(patches)) patches = [];
                } catch(e) { patches = []; }
            }
            renderPatches();
        }

        function exportPatches() {
            if(patches.length === 0 || (patches.length === 1 && !patches[0].target.trim())) {
                return showToast("Crie regras primeiro para exportar.");
            }
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(patches, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "cinerave_patches_backup_" + new Date().getTime() + ".json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function importPatches(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (Array.isArray(imported)) {
                        patches = imported;
                        renderPatches();
                        saveData();
                        showToast("Patches importados com sucesso!");
                    } else {
                        showToast("Arquivo JSON inválido.");
                    }
                } catch (err) {
                    showToast("Erro ao ler arquivo. Formato incorreto.");
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // Limpa o input file
        }
    </script>
</body>
</html>
